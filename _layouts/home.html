---
layout: default
---

{%- if site.posts.size > 0 -%}
<ul class="post-list">
  {%- for post in site.posts -%}
  <li class="post-list-item">
    <span class="post-list-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a class="post-list-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
  </li>
  {%- endfor -%}
</ul>
{%- endif -%}
